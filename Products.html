<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="林楊五金有限公司產品目錄，提供各類五金工具、手工具、電動工具及工業補給。">
    <meta name="keywords" content="五金工具,手工具,電動工具,螺絲緊固件,工業安全用品,五金零件">
    <meta name="author" content="林楊五金有限公司">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.antelopehw.com.tw/Products.html">
    <title>產品中心 | 林楊五金有限公司</title>

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- 導入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; }
        .modal-active { overflow: hidden; }
        .product-card:hover .overlay { opacity: 1; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        
        /* 限制產品圖比例，確保在四欄佈局下高度一致 */
        .img-container {
            aspect-ratio: 4 / 3;
            overflow: hidden;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Microsoft JhengHei', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- 導覽列 (同步自 services.html) -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <!-- 公司 Logo 與名稱區塊 -->
            <a href="index.html" class="flex items-center space-x-2">
                <img src="https://raw.githubusercontent.com/antelopehardware/antelopehardware.github.io/refs/heads/main/logo.jpg" alt="林楊五金有限公司 Logo" class="h-10 w-10 rounded-full object-cover shadow-md">
                <div class="flex flex-col">
                    <span class="font-bold text-lg text-gray-900">林楊五金有限公司</span>
                    <span class="text-sm text-gray-500">Antelope Hardware Ltd.</span>
                </div>
            </a>
            
            <!-- 手機版選單按鈕與語言切換 -->
            <div class="flex items-center md:hidden space-x-4">
                <button id="lang-btn-mobile" class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">English</button>
                <button id="mobile-menu-button" class="text-gray-700 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
            </div>
            
            <!-- 導覽連結 -->
            <div id="nav-links-wrapper" class="hidden md:flex md:space-x-6">
                <a href="index.html" class="nav-link text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300" data-key="home">首頁</a>
                <a href="services.html" class="nav-link text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300" data-key="services">服務項目</a>
                <a href="Products.html" class="nav-link text-blue-600 font-bold transition-colors duration-300" data-key="products">產品</a>
                <a href="about.html" class="nav-link text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300" data-key="about">關於我們</a>
                <a href="contact.html" class="nav-link text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300" data-key="contact">聯絡我們</a>
                <button id="lang-btn-desktop" class="text-gray-700 hover:text-blue-600 font-medium transition-colors duration-300">English</button>
            </div>
        </div>
        
        <!-- 手機版下拉選單 -->
        <div id="mobile-menu" class="hidden md:hidden bg-white/90 backdrop-blur-md w-full shadow-lg">
            <a href="index.html" class="block py-3 px-4 text-gray-700 hover:bg-blue-100" data-key="home">首頁</a>
            <a href="services.html" class="block py-3 px-4 text-gray-700 hover:bg-blue-100" data-key="services">服務項目</a>
            <a href="Products.html" class="block py-3 px-4 text-blue-600 font-bold hover:bg-blue-100" data-key="products">產品</a>
            <a href="about.html" class="block py-3 px-4 text-gray-700 hover:bg-blue-100" data-key="about">關於我們</a>
            <a href="contact.html" class="block py-3 px-4 text-gray-700 hover:bg-blue-100" data-key="contact">聯絡我們</a>
        </div>
    </nav>

    <!-- 頁首標題 -->
    <header class="bg-gray-800 py-16 text-white text-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-30 bg-cover bg-center" style="background-image: url('https://raw.githubusercontent.com/antelopehardware/antelopehardware.github.io/refs/heads/main/pic/hero-shipping.png');"></div>
        <div class="relative z-10">
            <h1 class="text-4xl font-bold mb-2" data-key="productCenterTitle">產品中心</h1>
            <p class="text-lg opacity-90" data-key="productCenterSubtitle">為您採購最優質的五金物資與設備</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- 分類篩選按鈕 -->
        <div class="flex flex-wrap justify-center gap-3 mb-12 fade-in" id="filter-buttons">
            <button onclick="filterProducts('all')" class="filter-btn active bg-blue-600 text-white px-5 py-2 rounded-full shadow-md transition text-sm sm:text-base" data-key="allProducts">全部產品</button>
            <button onclick="filterProducts('tools')" class="filter-btn bg-white text-gray-700 hover:bg-blue-100 px-5 py-2 rounded-full shadow-sm transition text-sm sm:text-base" data-key="handTools">手工具</button>
            <button onclick="filterProducts('power')" class="filter-btn bg-white text-gray-700 hover:bg-blue-100 px-5 py-2 rounded-full shadow-sm transition text-sm sm:text-base" data-key="powerTools">電動工具</button>
            <button onclick="filterProducts('fasteners')" class="filter-btn bg-white text-gray-700 hover:bg-blue-100 px-5 py-2 rounded-full shadow-sm transition text-sm sm:text-base" data-key="fasteners">螺絲緊固件</button>
            <button onclick="filterProducts('safety')" class="filter-btn bg-white text-gray-700 hover:bg-blue-100 px-5 py-2 rounded-full shadow-sm transition text-sm sm:text-base" data-key="safetyGear">工業安全用品</button>
        </div>

        <!-- 產品網格: 手機 1 欄 / 平板 3 欄 / 桌面 5 欄 -->
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6 fade-in" id="product-grid">
            <!-- 產品卡片將由 JS 動態產生 -->
        </div>
    </main>

    <!-- 產品詳細 Modal (大圖檢視) -->
    <div id="productModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-black bg-opacity-75 backdrop-blur-sm">
        <div class="bg-white rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-3xl z-10">&times;</button>
            
            <div class="flex flex-col md:flex-row">
                <div class="md:w-1/2 bg-gray-100 flex items-center justify-center p-6">
                    <img id="modalImg" src="" alt="產品大圖" class="max-w-full h-auto rounded-lg shadow-md transition-all duration-300">
                </div>
                <div class="md:w-1/2 p-8">
                    <span id="modalCategory" class="text-blue-600 font-semibold text-sm uppercase tracking-wider">分類</span>
                    <h2 id="modalTitle" class="text-3xl font-bold mt-2 mb-4">產品名稱</h2>
                    <p id="modalDesc" class="text-gray-600 mb-6 leading-relaxed">產品介紹...</p>
                    
                    <div class="mt-8">
                        <a id="inquiryLink" href="mailto:service@antelope-hardware.com" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition w-full text-center">
                            <i class="fas fa-paper-plane mr-2"></i> <span data-key="inquireQuote">立即詢問報價</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 頁尾 -->
    <footer class="text-center p-8 bg-gray-100 text-gray-600 mt-20">
        <div class="max-w-7xl mx-auto px-4">
            <h4 class="font-bold text-gray-900 mb-2">林楊五金有限公司 Antelope Hardware Ltd.</h4>
            <small data-key="footerAddress">臺中市清水區吳厝里和睦路三段250號1樓</small>
            <p class="mt-4 text-xs text-gray-400">&copy; 2025 Antelope Hardware Ltd. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // 定義所有需要翻譯的文字內容
        const translations = {
            'zh-TW': {
                // 導覽列文字
                home: '首頁',
                services: '服務項目',
                products: '產品',
                about: '關於我們',
                contact: '聯絡我們',
            productCenterTitle: '產品中心',
            productCenterSubtitle: '為您採購最優質的五金物資與設備',
            allProducts: '全部產品',
            handTools: '手工具',
            powerTools: '電動工具',
            fasteners: '螺絲緊固件',
            safetyGear: '工業安全用品',
            inquireQuote: '立即詢問報價',
            footerAddress: '臺中市清水區吳厝里和睦路三段250號1樓',
                toggleButton: 'English',
            toggleButtonMobile: 'English',
            },
            'en': {
                // Navigation text
                home: 'Home',
                services: 'Services',
                products: 'Products',
                about: 'About Us',
                contact: 'Contact Us',
            productCenterTitle: 'Product Center',
            productCenterSubtitle: 'Procuring high-quality hardware supplies and equipment for you',
            allProducts: 'All Products',
            handTools: 'Hand Tools',
            powerTools: 'Power Tools',
            fasteners: 'Fasteners',
            safetyGear: 'Safety Gear',
            inquireQuote: 'Inquire for Quote',
            footerAddress: '1F, No. 250, Sec. 3, Hemu Rd., Wucuo Li, Qingshui Dist., Taichung City',
                toggleButton: '中文',
            toggleButtonMobile: '中文',
            }
        };

        // 獲取需要切換語言的元素
        const elementsToTranslate = {
            'home': document.querySelector('[data-key="home"]'),
            'services': document.querySelector('[data-key="services"]'),
            'products': document.querySelector('[data-key="products"]'),
            'about': document.querySelector('[data-key="about"]'),
            'contact': document.querySelector('[data-key="contact"]'),
            'productCenterTitle': document.querySelector('[data-key="productCenterTitle"]'),
            'productCenterSubtitle': document.querySelector('[data-key="productCenterSubtitle"]'),
            'allProducts': document.querySelector('[data-key="allProducts"]'),
            'handTools': document.querySelector('[data-key="handTools"]'),
            'powerTools': document.querySelector('[data-key="powerTools"]'),
            'fasteners': document.querySelector('[data-key="fasteners"]'),
            'safetyGear': document.querySelector('[data-key="safetyGear"]'),
            'inquireQuote': document.querySelector('[data-key="inquireQuote"]'),
            'footerAddress': document.querySelector('[data-key="footerAddress"]'),
            'toggleButton': document.getElementById('lang-btn-desktop'),
            'toggleButtonMobile': document.getElementById('lang-btn-mobile'),
        };

        // 語言切換函數
        function toggleLanguage() {
            // 從瀏覽器儲存中獲取當前語言，如果沒有則預設為中文
            let currentLang = localStorage.getItem('lang') || 'zh-TW';
            let newLang = currentLang === 'zh-TW' ? 'en' : 'zh-TW';

            // 根據新語言更新所有元素的文字
            for (const key in elementsToTranslate) {
                if (elementsToTranslate[key]) {
                    elementsToTranslate[key].textContent = translations[newLang][key];
                }
            }
            
            // 更新網頁的 lang 屬性
            document.documentElement.lang = newLang;
            // 將新語言儲存到瀏覽器中
            localStorage.setItem('lang', newLang);
            
            // 重新渲染產品
            renderProducts();
        }
        
        // 點擊語言切換按鈕時執行函數
        document.getElementById('lang-btn-desktop').addEventListener('click', toggleLanguage);
        document.getElementById('lang-btn-mobile').addEventListener('click', toggleLanguage);
        
        /* ============================================================
           產品數據管理 - 從 products.json 文件加載
           ============================================================
           
           所有商品數據存儲在 products.json 文件中
           此頁面將自動讀取並動態生成商品卡片
           
           如何新增產品:
           1. 打開 products.json 文件
           2. 在 "products" 陣列中新增新的產品對象
           
           產品字段說明:
           - id: 產品唯一識別碼（必須是唯一數字）
           - category: 產品分類
             可選值: "tools" (手工具) / "power" (電動工具) / 
                    "fasteners" (螺絲緊固件) / "safety" (工業安全用品)
           - name: 產品名稱 { zh: "中文名稱", en: "English Name" }
           - categoryName: 分類顯示名稱 { zh: "中文", en: "English" }
           - img: 產品圖片網址 (可使用 Unsplash 或其他圖片服務)
           - desc: 產品描述 { zh: "中文描述", en: "English Description" }
           - specs: 產品規格 (可選)
           
           ============================================================ */
        let products = [];
        function renderProducts(filter = 'all') {
            const grid = document.getElementById('product-grid');
            const lang = document.documentElement.lang === 'zh-TW' ? 'zh' : 'en';
            grid.innerHTML = '';

            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card bg-white rounded-lg shadow-sm overflow-hidden border border-gray-100 hover:shadow-lg transition-all duration-300 cursor-pointer group';
                card.onclick = () => openModal(p);
                
                card.innerHTML = `
                    <div class="relative img-container bg-gray-50">
                        <img src="${p.img}" alt="${p.name[lang]}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="overlay absolute inset-0 bg-black/10 opacity-0 transition-opacity flex items-center justify-center">
                            <span class="bg-white/90 text-gray-800 px-3 py-1.5 rounded-full text-xs font-bold shadow-sm">${lang === 'zh' ? '查看細節' : 'View Details'}</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <div class="mb-1">
                            <span class="text-[10px] font-bold text-blue-600 uppercase tracking-tight">${p.categoryName[lang]}</span>
                        </div>
                        <h3 class="font-bold text-base line-clamp-1">
                            <a href="https://www.antelopehw.com.tw/Products.html" class="text-gray-900 hover:text-blue-600 group-hover:text-blue-600 transition-colors">${p.name[lang]}</a>
                        </h3>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterProducts(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                btn.classList.add('bg-white', 'text-gray-700');
            });
            event.currentTarget.classList.remove('bg-white', 'text-gray-700');
            event.currentTarget.classList.add('bg-blue-600', 'text-white', 'shadow-md');
            renderProducts(category);
        }

        const modal = document.getElementById('productModal');
        function openModal(product) {
            const lang = document.documentElement.lang === 'zh-TW' ? 'zh' : 'en';
            document.getElementById('modalImg').src = product.img;
            document.getElementById('modalTitle').textContent = product.name[lang];
            document.getElementById('modalCategory').textContent = product.categoryName[lang];
            document.getElementById('modalDesc').textContent = product.desc[lang];
            
            // 更新詢價連結的 mailto 屬性，帶入主旨與內容範本
            const inquiryLink = document.getElementById('inquiryLink');
            const email = 'service@antelope-hardware.com';
            let subject, bodyTemplate;
            if (lang === 'zh') {
                // 中文主旨：產品名稱詢價
                subject = `${product.name[lang]}詢價`;
                bodyTemplate = `公司名稱:\n聯絡人:\n電話:\n詢問數量、規格等內容`;
            } else {
                // English subject and body template
                subject = `Quote request - ${product.name[lang]}`;
                bodyTemplate = `Company Name:\nContact Person:\nPhone:\nQuantity/specifications, etc.`;
            }
            inquiryLink.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyTemplate)}`;

            modal.classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            modal.classList.add('hidden');
            document.body.classList.remove('modal-active');
        }

        window.onclick = (e) => { if (e.target == modal) closeModal(); }

        // 多語系切換邏輯
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMenuBtn = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            mobileMenuBtn.onclick = () => mobileMenu.classList.toggle('hidden');

            // 初始化語言
            let currentLang = localStorage.getItem('lang') || 'zh-TW';
            document.documentElement.lang = currentLang;
            for (const key in elementsToTranslate) {
                if (elementsToTranslate[key]) {
                    elementsToTranslate[key].textContent = translations[currentLang][key];
                }
            }
            
            // 從 products.json 加載商品數據
            fetch('products.json')
                .then(response => response.json())
                .then(data => {
                    products = data.products;
                    renderProducts();
                })
                .catch(error => console.error('Error loading products:', error));
        });
    </script>
</body>
</html>
